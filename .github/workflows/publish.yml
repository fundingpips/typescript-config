name: Publish

on:
  release:
    types: [published]

# Guard against double-publish if a release is edited/re-published while
# a run is in flight. Do NOT set cancel-in-progress here — partial
# publishes corrupt sigstore attestations and leave inconsistent state.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"

      # Fail fast before install / tests / sigstore signing if NPM_TOKEN
      # is expired, revoked, or scoped incorrectly. npm's publish endpoint
      # returns a misleading 404 on auth failure; `whoami` returns a clear
      # "ENEEDAUTH" or username, so the failure mode is obvious.
      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate configs
        run: pnpm test

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
